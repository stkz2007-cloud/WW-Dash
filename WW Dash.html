<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf GM Dashboard - Dice Animation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap');
        body { font-family: 'Kanit', sans-serif; background: #0f0f1a; color: #e0e0e0; padding: 20px; }
        .container { max-width: 1300px; margin: auto; background: #161625; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        h1 { text-align: center; color: #ff2e63; margin-bottom: 10px; }
        
        /* Stats Bar */
        .stats-bar { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; background: #1a1a2e; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .stat-item { font-size: 1.1em; font-weight: 500; }
        .stat-alive { color: #4ecca3; }
        .stat-dead { color: #ff4b2b; }
        .stat-cult { color: #b06ab3; }

        /* Event System Styles */
        .event-control { background: #1a1a2e; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #444; text-align: center; }
        #eventDisplay { margin-top: 15px; padding: 15px; background: #252535; border-radius: 8px; display: none; border-left: 5px solid #ff2e63; }
        .dice-num { font-size: 2.5em; color: #ff2e63; font-weight: bold; margin-right: 15px; display: inline-block; min-width: 60px; }
        .event-text { font-size: 1.2em; color: #fff; vertical-align: middle; }
        button.roll-btn { background: #ff2e63; color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button.roll-btn:disabled { background: #555; cursor: not-allowed; }

        /* Table & Inputs */
        .input-group { display: flex; gap: 10px; margin-bottom: 25px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #2c2c2c; color: #fff; }
        input[type="text"] { flex-grow: 1; }
        button.add-btn { background: #ff2e63; color: white; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
        th { background: #1a1a2e; color: #ff2e63; padding: 12px; font-size: 0.85em; border-bottom: 2px solid #ff2e63; }
        td { padding: 10px; text-align: center; background: #161625; border-bottom: 1px solid #252535; }

        .row-dead { background: #3d0000 !important; color: #777; opacity: 0.6; }
        .row-protected { border-left: 5px solid #00adff; background: rgba(0, 173, 255, 0.05); }
        .row-cult { border-left: 5px solid #b06ab3; background: rgba(176, 106, 179, 0.1); }
        .row-hooligan-target { border-left: 5px solid #d35400; background: rgba(211, 84, 0, 0.1); }
        .row-lover { border-left: 5px solid #ff69b4; }
        
        .name-tag { font-size: 1.1em; font-weight: bold; }
        .exiled { text-decoration: line-through; color: #ff4b2b; }
        .muted { color: #f0a500; }
        
        .cupid-input { width: 80px; background: #2d1b24; color: #ff69b4; border: 1px solid #ff69b444; border-radius: 5px; text-align: center; }
        .role-input { width: 80px; background: transparent; border: 1px solid #444; color: #4ecca3; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐺 WEREWOLF GM DASHBOARD</h1>
    
    <div class="stats-bar">
        <div class="stat-item">👥 ทั้งหมด: <span id="totalCount">0</span></div>
        <div class="stat-item stat-alive">🟢 มีชีวิต: <span id="aliveCount">0</span></div>
        <div class="stat-item stat-dead">💀 ตายแล้ว: <span id="deadCount">0</span></div>
        <div class="stat-item stat-cult">👁️ ลัทธิ: <span id="cultCount">0</span></div>
    </div>

    <div class="event-control">
        <label style="cursor: pointer; font-size: 1.1em;">
            <input type="checkbox" id="useEvent" onchange="toggleEventPanel()"> ใช้ระบบเหตุการณ์ประจำวัน
        </label>
        
        <div id="eventPanel" style="display: none; margin-top: 15px;">
            <button class="roll-btn" id="rollBtn" onclick="rollEventWithAnim()">🎲 ทอยลูกเต๋าสุ่มเหตุการณ์</button>
            <div id="eventDisplay">
                <span class="dice-num" id="diceResult">?</span>
                <span class="event-text" id="eventDesc">รอลุ้นเหตุการณ์...</span>
            </div>
        </div>
    </div>

    <div class="input-group">
        <input type="text" id="playerName" placeholder="ชื่อผู้เล่น">
        <input type="text" id="playerRole" placeholder="บทบาท">
        <button class="add-btn" onclick="addPlayer()">เพิ่มผู้เล่น</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ชื่อผู้เล่น</th>
                <th>บทบาท</th>
                <th>❤️ คู่รัก</th>
                <th>👊 อันธพาลเลือก</th>
                <th>👁️ ลัทธิ</th>
                <th>🛡️ ป้องกัน</th>
                <th>💀 ตาย</th>
                <th>⚖️ เนรเทศ</th>
                <th>🤫 ใบ้</th>
                <th>ลบ</th>
            </tr>
        </thead>
        <tbody id="playerList"></tbody>
    </table>
</div>

<script>
    const events = {
        2: "คืนถัดไป เป้าหมายของมนุษย์หมาป่า จะกลายเป็นมนุษย์หมาป่าตัวใหม่",
        3: "ผู้เล่นที่ถูกกล่าวหา 2 คน จะถูกกำจัดทันทีโดยไม่ต้องโหวต",
        4: "จะมีผู้เล่นถูกกำจัด 2 คนแทนที่จะเป็น 1 คนเหมือนปกติ",
        5: "บอกให้ผู้เล่นทุกคนรู้ว่าเทพพยากรณ์ถามบทบาทใครในคืนที่ผ่านมา",
        6: "ไม่มีการเหตุการณ์ใดเกิดขึ้น",
        7: "ไม่มีการเหตุการณ์ใดเกิดขึ้น",
        8: "ไม่มีการเหตุการณ์ใดเกิดขึ้น",
        9: "เหตุการณ์เหมือนเมื่อวานนี้",
        10: "ใช้การกำจัดผู้เล่นแบบตัดตัวเลือก",
        11: "ห้ามไม่ให้พูดคุยกัน นอกจากการทำการกล่าวหา",
        12: "คืนถัดไป เป้าหมายของมนุษย์หมาป่า จะไม่ตายแต่จะต้องสูญเสียพลังพิเศษ"
    };

    function toggleEventPanel() {
        const isChecked = document.getElementById('useEvent').checked;
        document.getElementById('eventPanel').style.display = isChecked ? 'block' : 'none';
    }

    // ฟังก์ชันสุ่มแบบมี Animation 2 วินาที
    function rollEventWithAnim() {
        const btn = document.getElementById('rollBtn');
        const diceDisplay = document.getElementById('diceResult');
        const descDisplay = document.getElementById('eventDesc');
        const displayBox = document.getElementById('eventDisplay');

        btn.disabled = true;
        btn.innerText = "⏳ กำลังทอย...";
        displayBox.style.display = 'block';
        descDisplay.innerText = "กำลังคำนวณเหตุการณ์...";
        descDisplay.style.opacity = "0.5";

        // สร้าง Animation เลขวิ่ง
        let counter = 0;
        const interval = setInterval(() => {
            diceDisplay.innerText = Math.floor(Math.random() * 11) + 2; // สุ่ม 2-12 วิ่งไปมา
            counter += 100;
            if (counter >= 2000) { // หยุดเมื่อครบ 2000ms (2 วินาที)
                clearInterval(interval);
                finalizeRoll();
            }
        }, 100);

        function finalizeRoll() {
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            const finalResult = d1 + d2;

            diceDisplay.innerText = finalResult;
            descDisplay.innerText = events[finalResult];
            descDisplay.style.opacity = "1";
            btn.disabled = false;
            btn.innerText = "🎲 ทอยลูกเต๋าสุ่มเหตุการณ์";
        }
    }

    function updateStats() {
        const rows = document.querySelectorAll('#playerList tr');
        const total = rows.length;
        const dead = document.querySelectorAll('.dead-check:checked').length;
        const cults = document.querySelectorAll('.cult-check:checked').length;
        
        document.getElementById('totalCount').innerText = total;
        document.getElementById('aliveCount').innerText = total - dead;
        document.getElementById('deadCount').innerText = dead;
        document.getElementById('cultCount').innerText = cults;
    }

    function addPlayer() {
        const name = document.getElementById('playerName').value.trim();
        const role = document.getElementById('playerRole').value.trim();
        if (!name) return;

        const table = document.getElementById('playerList');
        const row = document.createElement('tr');
        row.setAttribute('data-name', name);
        
        row.innerHTML = `
            <td><span class="name-tag">${name}</span></td>
            <td><input type="text" class="role-input" value="${role}"></td>
            <td><input type="text" class="cupid-input" placeholder="..." oninput="updateLoverStyle(this)"></td>
            <td><input type="checkbox" class="hooligan-check" onchange="hooliganLogic(this)"></td>
            <td><input type="checkbox" class="cult-check" onchange="cultLogic(this)"></td>
            <td><input type="checkbox" class="protect-check" onchange="protectLogic(this)"></td>
            <td><input type="checkbox" class="dead-check" onchange="killLogic(this)"></td>
            <td><input type="checkbox" onchange="toggleEffect(this, 'exiled')"></td>
            <td><input type="checkbox" onchange="toggleEffect(this, 'muted')"></td>
            <td><button onclick="this.parentElement.parentElement.remove(); updateStats();" style="background:none; border:none; color:#555; cursor:pointer;">❌</button></td>
        `;

        table.appendChild(row);
        document.getElementById('playerName').value = "";
        document.getElementById('playerRole').value = "";
        updateStats();
    }

    function hooliganLogic(checkbox) {
        const row = checkbox.parentElement.parentElement;
        checkbox.checked ? row.classList.add('row-hooligan-target') : row.classList.remove('row-hooligan-target');
        updateStats();
    }

    function cultLogic(checkbox) {
        const row = checkbox.parentElement.parentElement;
        checkbox.checked ? row.classList.add('row-cult') : row.classList.remove('row-cult');
        updateStats();
    }

    function protectLogic(checkbox) {
        const row = checkbox.parentElement.parentElement;
        const deadCheck = row.querySelector('.dead-check');
        const loverName = row.querySelector('.cupid-input').value.trim();

        if (checkbox.checked) {
            row.classList.add('row-protected');
            if (deadCheck.checked) {
                deadCheck.checked = false;
                row.classList.remove('row-dead');
            }
            if (loverName !== "") syncLoverStatus(loverName, 'protect-check', true);
        } else {
            row.classList.remove('row-protected');
            if (loverName !== "") syncLoverStatus(loverName, 'protect-check', false);
        }
        updateStats();
    }

    function killLogic(checkbox) {
        const row = checkbox.parentElement.parentElement;
        const name = row.getAttribute('data-name');
        const isProtected = row.querySelector('.protect-check').checked;
        const loverName = row.querySelector('.cupid-input').value.trim();

        if (checkbox.checked) {
            if (isProtected) {
                alert(`🛡️ ${name} ป้องกันอยู่!`);
                checkbox.checked = false;
                return;
            }
            row.classList.add('row-dead');
            if (loverName !== "") syncLoverStatus(loverName, 'dead-check', true);
        } else {
            row.classList.remove('row-dead');
        }
        updateStats();
    }

    function syncLoverStatus(targetName, checkClass, state) {
        const allRows = document.querySelectorAll('#playerList tr');
        allRows.forEach(row => {
            if (row.getAttribute('data-name') === targetName) {
                const targetCheck = row.querySelector('.' + checkClass);
                if (checkClass === 'dead-check' && state === true && !row.querySelector('.protect-check').checked) {
                    targetCheck.checked = true;
                    row.classList.add('row-dead');
                } else if (checkClass === 'protect-check') {
                    targetCheck.checked = state;
                    state ? row.classList.add('row-protected') : row.classList.remove('row-protected');
                }
            }
        });
        updateStats();
    }

    function updateLoverStyle(input) {
        const row = input.parentElement.parentElement;
        input.value !== "" ? row.classList.add('row-lover') : row.classList.remove('row-lover');
    }

    function toggleEffect(checkbox, className) {
        const nameTag = checkbox.parentElement.parentElement.querySelector('.name-tag');
        checkbox.checked ? nameTag.classList.add(className) : nameTag.classList.remove(className);
    }
</script>

</body>
</html>
