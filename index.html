<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Werewolf GM - Mobile Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap');
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'Kanit', sans-serif; 
            background: #0f0f1a; 
            color: #e0e0e0; 
            padding: 10px; 
            margin: 0;
        }

        .container { 
            max-width: 100%; 
            margin: auto; 
            background: #161625; 
            padding: 15px; 
            border-radius: 15px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
        }

        h1 { text-align: center; color: #ff2e63; font-size: 1.5rem; margin-bottom: 15px; }
        
        /* Stats Bar - ปรับให้ยืดหยุ่นในมือถือ */
        .stats-bar { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 20px; 
            background: #1a1a2e; 
            padding: 12px; 
            border-radius: 12px; 
            border: 1px solid #333; 
        }
        .stat-item { font-size: 0.9em; text-align: center; }

        /* ส่วนกรอกข้อมูล - ปรับให้ซ้อนกันในมือถือ */
        .input-section { 
            width: 100%;
            margin-bottom: 25px; 
        }
        .input-row { 
            display: flex; 
            flex-direction: column; /* ซ้อนกันในมือถือ */
            gap: 10px; 
            margin-bottom: 10px; 
        }
        .input-row input { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #333; 
            background: #2c2c2c; 
            color: #fff; 
            font-size: 1rem; 
        }
        .add-btn { 
            width: 100%; 
            padding: 14px; 
            background: #ff2e63; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1rem;
        }

        /* หัวใจสำคัญ: ทำให้ตารางเลื่อนซ้ายขวาได้ */
        .table-responsive {
            width: 100%;
            overflow-x: auto; /* เปิดการเลื่อนแนวนอน */
            -webkit-overflow-scrolling: touch;
            border-radius: 10px;
            border: 1px solid #252535;
        }

        table { 
            width: 100%; 
            min-width: 600px; /* บังคับความกว้างขั้นต่ำเพื่อให้ตารางไม่เบียดกันจนอ่านไม่ออก */
            border-collapse: collapse; 
        }
        
        th { background: #1a1a2e; color: #ff2e63; padding: 10px; font-size: 0.75em; white-space: nowrap; }
        td { padding: 8px; text-align: center; background: #161625; border-bottom: 1px solid #252535; }

        /* Status Select & Input */
        .status-select { background: #0f3460; border: 1px solid #e94560; color: white; padding: 5px; border-radius: 5px; font-size: 0.85em; }
        .cupid-input { width: 65px; text-align: center; background: #2d1b24; color: #ff69b4; border: 1px solid #ff69b444; border-radius: 5px; font-size: 0.85em; }
        
        /* Row Highlighting */
        .status-dead { background: #3d0000 !important; color: #777; }
        .status-muted { color: #f0a500 !important; }
        .status-exiled { text-decoration: line-through; color: #ff4b2b !important; }
        .row-protected { border-left: 4px solid #00adff; }
        .row-cult { border-left: 4px solid #b06ab3; }
        .row-hooligan { border-left: 4px solid #d35400; }
        .row-lover { border-left: 4px solid #ff69b4; }

        /* Event Control */
        .event-control { background: #1a1a2e; padding: 10px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #444; text-align: center; font-size: 0.9em; }

        /* สำหรับหน้าจอใหญ่ (คอมพิวเตอร์) ให้กลับมาเป็นแนวนอน */
        @media (min-width: 600px) {
            .input-row { flex-direction: row; }
            .stats-bar { grid-template-columns: repeat(3, 1fr); }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🐺 WEREWOLF GM</h1>
    
    <div class="stats-bar">
        <div class="stat-item">👥 ทั้งหมด: <span id="totalCount">0</span></div>
        <div class="stat-item stat-alive">🟢 มีชีวิต: <span id="aliveCount">0</span></div>
        <div class="stat-item stat-dead">💀 ตายแล้ว: <span id="deadCount">0</span></div>
    </div>

    <div class="event-control">
        <label><input type="checkbox" id="useEvent" onchange="toggleEventPanel()"> ระบบเหตุการณ์ประจำวัน</label>
        <div id="eventPanel" style="display: none; margin-top: 10px;">
            <button class="add-btn" style="width: auto; padding: 8px 20px;" id="rollBtn" onclick="rollEventWithAnim()">🎲 ทอยลูกเต๋า</button>
            <div id="eventDisplay" style="margin-top:10px;">
                <span id="diceResult" style="font-size:1.5rem; color:#ff2e63; font-weight:bold;">?</span><br>
                <span id="eventDesc">...</span>
            </div>
        </div>
    </div>

    <div class="input-section">
        <div class="input-row">
            <input type="text" id="playerName" placeholder="ชื่อผู้เล่น">
            <input type="text" id="playerRole" placeholder="บทบาท">
        </div>
        <button class="add-btn" onclick="addPlayer()">➕ เพิ่มคนเล่นเข้ากระดาน</button>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>ชื่อ</th>
                    <th>บทบาท</th>
                    <th>❤️ คู่</th>
                    <th>👊 อันธ</th>
                    <th>👁️ ลัทธิ</th>
                    <th>🛡️ กัน</th>
                    <th>⚙️ สถานะ</th>
                    <th>ลบ</th>
                </tr>
            </thead>
            <tbody id="playerList"></tbody>
        </table>
    </div>
</div>

<script>
    // Logic ทั้งหมดเหมือนเดิม (ตัดทอนข้อความเหตุการณ์ให้สั้นลงเพื่อมือถือ)
    const events = { 2:"หมาป่าใหม่", 3:"กำจัด 2 คนทันที", 4:"กำจัด 2 แทน 1", 5:"เผยเทพพยากรณ์", 6:"ไม่มีเหตุการณ์", 7:"ไม่มีเหตุการณ์", 8:"ไม่มีเหตุการณ์", 9:"เหมือนเมื่อวาน", 10:"ตัดตัวเลือก", 11:"ห้ามพูดคุย", 12:"เสียพลังพิเศษ" };

    function toggleEventPanel() { document.getElementById('eventPanel').style.display = document.getElementById('useEvent').checked ? 'block' : 'none'; }

    function rollEventWithAnim() {
        const btn = document.getElementById('rollBtn');
        const dNum = document.getElementById('diceResult');
        const dText = document.getElementById('eventDesc');
        btn.disabled = true;
        let count = 0;
        const interval = setInterval(() => {
            dNum.innerText = Math.floor(Math.random() * 11) + 2;
            count += 100;
            if (count >= 2000) {
                clearInterval(interval);
                const res = (Math.floor(Math.random()*6)+1) + (Math.floor(Math.random()*6)+1);
                dNum.innerText = res;
                dText.innerText = events[res];
                btn.disabled = false;
            }
        }, 100);
    }

    function addPlayer() {
        const nInput = document.getElementById('playerName');
        const rInput = document.getElementById('playerRole');
        if (!nInput.value.trim()) return;

        const table = document.getElementById('playerList');
        const row = document.createElement('tr');
        row.setAttribute('data-name', nInput.value.trim());
        row.innerHTML = `
            <td><span class="name-tag" style="font-size:0.9em;">${nInput.value.trim()}</span></td>
            <td><input type="text" style="width:50px; background:none; border:1px solid #444; color:#4ecca3; text-align:center; font-size:0.8em;" value="${rInput.value.trim()}"></td>
            <td><input type="text" class="cupid-input" placeholder="..." oninput="this.parentElement.parentElement.classList.toggle('row-lover', this.value!=='')"></td>
            <td><input type="checkbox" onchange="this.parentElement.parentElement.classList.toggle('row-hooligan', this.checked)"></td>
            <td><input type="checkbox" onchange="this.parentElement.parentElement.classList.toggle('row-cult', this.checked)"></td>
            <td><input type="checkbox" class="protect-check" onchange="handleProtect(this)"></td>
            <td>
                <select class="status-select" onchange="handleStatus(this)">
                    <option value="normal">🟢 ปกติ</option>
                    <option value="dead">💀 ตาย</option>
                    <option value="muted">🤫 ใบ้</option>
                    <option value="exiled">⚖️ เนรเทศ</option>
                </select>
            </td>
            <td><button onclick="this.parentElement.parentElement.remove(); updateStats();" style="background:none; border:none; color:#555;">❌</button></td>
        `;
        table.appendChild(row);
        nInput.value = ""; rInput.value = "";
        updateStats();
    }

    function handleProtect(check) {
        const row = check.parentElement.parentElement;
        row.classList.toggle('row-protected', check.checked);
        if (check.checked) {
            const sel = row.querySelector('.status-select');
            if (sel.value === 'dead') { sel.value = 'normal'; handleStatus(sel); }
        }
    }

    function handleStatus(select) {
        const row = select.parentElement.parentElement;
        const name = row.getAttribute('data-name');
        const isProtected = row.querySelector('.protect-check').checked;
        const loverName = row.querySelector('.cupid-input').value.trim();
        row.classList.remove('status-dead');
        row.querySelector('.name-tag').classList.remove('status-muted', 'status-exiled');
        if (select.value === 'dead') {
            if (isProtected) { alert(`🛡️ ${name} ป้องกันอยู่!`); select.value = 'normal'; return; }
            row.classList.add('status-dead');
            if (loverName) syncDead(loverName);
        } else if (select.value === 'muted') {
            row.querySelector('.name-tag').classList.add('status-muted');
        } else if (select.value === 'exiled') {
            row.querySelector('.name-tag').classList.add('status-exiled');
        }
        updateStats();
    }

    function syncDead(targetName) {
        document.querySelectorAll('#playerList tr').forEach(row => {
            if (row.getAttribute('data-name') === targetName && !row.querySelector('.protect-check').checked) {
                const sel = row.querySelector('.status-select');
                if (sel.value !== 'dead') { sel.value = 'dead'; handleStatus(sel); }
            }
        });
    }

    function updateStats() {
        const rows = document.querySelectorAll('#playerList tr');
        let deadCount = 0;
        rows.forEach(r => { if (r.querySelector('.status-select').value === 'dead') deadCount++; });
        document.getElementById('totalCount').innerText = rows.length;
        document.getElementById('aliveCount').innerText = rows.length - deadCount;
        document.getElementById('deadCount').innerText = deadCount;
    }
</script>
</body>
</html>
