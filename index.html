<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Werewolf GM Dashboard - Aligned Layout</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap');
        
        * { box-sizing: border-box; } /* ป้องกันส่วนประกอบล้นขอบ */

        body { font-family: 'Kanit', sans-serif; background: #0f0f1a; color: #e0e0e0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: #161625; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        h1 { text-align: center; color: #ff2e63; margin-bottom: 10px; }
        
        .stats-bar { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; background: #1a1a2e; padding: 15px; border-radius: 12px; border: 1px solid #333; flex-wrap: wrap; }
        .stat-item { font-size: 1.1em; font-weight: 500; }
        .stat-alive { color: #4ecca3; }
        .stat-dead { color: #ff4b2b; }

        /* Event System */
        .event-control { background: #1a1a2e; padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px dashed #444; text-align: center; }
        #eventDisplay { margin-top: 15px; padding: 15px; background: #252535; border-radius: 8px; display: none; border-left: 5px solid #ff2e63; }
        .dice-num { font-size: 2.5em; color: #ff2e63; font-weight: bold; margin-right: 15px; }

        /* ปรับ Layout ส่วนกรอกข้อมูลให้กว้างเท่ากันเป๊ะ */
        .input-section { max-width: 600px; margin: 0 auto 30px auto; } /* คุมความกว้างให้อยู่ตรงกลาง */
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; width: 100%; }
        .input-row input { flex: 1; padding: 14px; border-radius: 8px; border: 1px solid #333; background: #2c2c2c; color: #fff; font-size: 1rem; width: 0; } /* width 0 ช่วยให้ flex ทำงานร่วมกับ gap ได้เป๊ะขึ้น */
        .add-btn { width: 100%; padding: 14px; background: #ff2e63; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.2s; display: block; }
        .add-btn:hover { background: #ff527b; }
        .add-btn:disabled { background: #555; }

        /* Table Styles */
        table { width: 100%; border-collapse: collapse; border-radius: 10px; overflow: hidden; }
        th { background: #1a1a2e; color: #ff2e63; padding: 12px; font-size: 0.85em; border-bottom: 2px solid #ff2e63; text-align: center; }
        td { padding: 10px; text-align: center; background: #161625; border-bottom: 1px solid #252535; }

        /* Status & Effects */
        .status-dead { background: #3d0000 !important; color: #777; }
        .status-muted { color: #f0a500 !important; font-style: italic; }
        .status-exiled { text-decoration: line-through; color: #ff4b2b !important; opacity: 0.5; }
        .row-protected { border-left: 5px solid #00adff; background: rgba(0, 173, 255, 0.05) !important; }
        .row-cult { border-left: 5px solid #b06ab3; background: rgba(176, 106, 179, 0.05) !important; }
        .row-hooligan { border-left: 5px solid #d35400; background: rgba(211, 84, 0, 0.05) !important; }
        .row-lover { border-left: 5px solid #ff69b4; }
        
        .name-tag { font-size: 1.1em; font-weight: bold; }
        .status-select { background: #0f3460; border: 1px solid #e94560; color: white; padding: 5px; border-radius: 5px; }
        .cupid-input { width: 80px; text-align: center; background: #2d1b24; color: #ff69b4; border: 1px solid #ff69b444; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🐺 WEREWOLF GM DASHBOARD</h1>
    
    <div class="stats-bar">
        <div class="stat-item">👥 ทั้งหมด: <span id="totalCount">0</span></div>
        <div class="stat-item stat-alive">🟢 มีชีวิต: <span id="aliveCount">0</span></div>
        <div class="stat-item stat-dead">💀 ตายแล้ว: <span id="deadCount">0</span></div>
    </div>

    <div class="event-control">
        <label style="cursor: pointer;"><input type="checkbox" id="useEvent" onchange="toggleEventPanel()"> ระบบเหตุการณ์ประจำวัน</label>
        <div id="eventPanel" style="display: none; margin-top: 15px;">
            <button class="add-btn" style="width: auto; margin: 0 auto; padding: 10px 30px;" id="rollBtn" onclick="rollEventWithAnim()">🎲 ทอยลูกเต๋า</button>
            <div id="eventDisplay">
                <span class="dice-num" id="diceResult">?</span>
                <span id="eventDesc" style="font-size: 1.2em;">กดปุ่มเพื่อเริ่มลุ้น...</span>
            </div>
        </div>
    </div>

    <div class="input-section">
        <div class="input-row">
            <input type="text" id="playerName" placeholder="ชื่อผู้เล่น">
            <input type="text" id="playerRole" placeholder="บทบาท">
        </div>
        <button class="add-btn" onclick="addPlayer()">➕ เพิ่มคนเล่นเข้าสู่กระดาน</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ชื่อผู้เล่น</th>
                <th>บทบาท</th>
                <th>❤️ คู่รัก</th>
                <th>👊 อันธพาล</th>
                <th>👁️ ลัทธิ</th>
                <th>🛡️ ป้องกัน</th>
                <th>⚙️ สถานะ</th>
                <th>ลบ</th>
            </tr>
        </thead>
        <tbody id="playerList"></tbody>
    </table>
</div>

<script>
    // ... (Logic เดิมทั้งหมดยังคงอยู่) ...
    const events = { 2:"เป้าหมายจะกลายเป็นหมาป่าตัวใหม่", 3:"กำจัด 2 คนทันทีไม่ต้องโหวต", 4:"กำจัด 2 คนแทน 1 คนปกติ", 5:"เผยบทที่เทพพยากรณ์เช็ก", 6:"ไม่มีเหตุการณ์", 7:"ไม่มีเหตุการณ์", 8:"ไม่มีเหตุการณ์", 9:"เหมือนเมื่อวาน", 10:"กำจัดแบบตัดตัวเลือก", 11:"ห้ามพูดนอกจากกล่าวหา", 12:"เป้าหมายไม่ตายแต่เสียพลังพิเศษ" };

    function toggleEventPanel() { document.getElementById('eventPanel').style.display = document.getElementById('useEvent').checked ? 'block' : 'none'; }

    function rollEventWithAnim() {
        const btn = document.getElementById('rollBtn');
        const dNum = document.getElementById('diceResult');
        const dText = document.getElementById('eventDesc');
        btn.disabled = true;
        document.getElementById('eventDisplay').style.display = 'block';
        let count = 0;
        const interval = setInterval(() => {
            dNum.innerText = Math.floor(Math.random() * 11) + 2;
            count += 100;
            if (count >= 2000) {
                clearInterval(interval);
                const res = (Math.floor(Math.random()*6)+1) + (Math.floor(Math.random()*6)+1);
                dNum.innerText = res;
                dText.innerText = events[res];
                btn.disabled = false;
            }
        }, 100);
    }

    function addPlayer() {
        const nInput = document.getElementById('playerName');
        const rInput = document.getElementById('playerRole');
        if (!nInput.value.trim()) return;

        const table = document.getElementById('playerList');
        const row = document.createElement('tr');
        row.setAttribute('data-name', nInput.value.trim());
        row.innerHTML = `
            <td><span class="name-tag">${nInput.value.trim()}</span></td>
            <td><input type="text" style="width:70px; background:none; border:1px solid #444; color:#4ecca3; text-align:center;" value="${rInput.value.trim()}"></td>
            <td><input type="text" class="cupid-input" placeholder="..." oninput="this.parentElement.parentElement.classList.toggle('row-lover', this.value!=='')"></td>
            <td><input type="checkbox" onchange="this.parentElement.parentElement.classList.toggle('row-hooligan', this.checked)"></td>
            <td><input type="checkbox" onchange="this.parentElement.parentElement.classList.toggle('row-cult', this.checked)"></td>
            <td><input type="checkbox" class="protect-check" onchange="handleProtect(this)"></td>
            <td>
                <select class="status-select" onchange="handleStatus(this)">
                    <option value="normal">🟢 ปกติ</option>
                    <option value="dead">💀 ตายแล้ว</option>
                    <option value="muted">🤫 ใบ้</option>
                    <option value="exiled">⚖️ เนรเทศ</option>
                </select>
            </td>
            <td><button onclick="this.parentElement.parentElement.remove(); updateStats();" style="background:none; border:none; color:#555; cursor:pointer;">❌</button></td>
        `;
        table.appendChild(row);
        nInput.value = ""; rInput.value = "";
        updateStats();
    }

    function handleProtect(check) {
        const row = check.parentElement.parentElement;
        row.classList.toggle('row-protected', check.checked);
        if (check.checked) {
            const sel = row.querySelector('.status-select');
            if (sel.value === 'dead') { sel.value = 'normal'; handleStatus(sel); }
        }
    }

    function handleStatus(select) {
        const row = select.parentElement.parentElement;
        const name = row.getAttribute('data-name');
        const isProtected = row.querySelector('.protect-check').checked;
        const loverName = row.querySelector('.cupid-input').value.trim();
        row.classList.remove('status-dead');
        row.querySelector('.name-tag').classList.remove('status-muted', 'status-exiled');
        if (select.value === 'dead') {
            if (isProtected) { alert(`🛡️ ${name} ป้องกันอยู่!`); select.value = 'normal'; return; }
            row.classList.add('status-dead');
            if (loverName) syncDead(loverName);
        } else if (select.value === 'muted') {
            row.querySelector('.name-tag').classList.add('status-muted');
        } else if (select.value === 'exiled') {
            row.querySelector('.name-tag').classList.add('status-exiled');
        }
        updateStats();
    }

    function syncDead(targetName) {
        document.querySelectorAll('#playerList tr').forEach(row => {
            if (row.getAttribute('data-name') === targetName && !row.querySelector('.protect-check').checked) {
                const sel = row.querySelector('.status-select');
                if (sel.value !== 'dead') { sel.value = 'dead'; handleStatus(sel); }
            }
        });
    }

    function updateStats() {
        const rows = document.querySelectorAll('#playerList tr');
        let deadCount = 0;
        rows.forEach(r => { if (r.querySelector('.status-select').value === 'dead') deadCount++; });
        document.getElementById('totalCount').innerText = rows.length;
        document.getElementById('aliveCount').innerText = rows.length - deadCount;
        document.getElementById('deadCount').innerText = deadCount;
    }
</script>
</body>
</html>
