<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // ⚠️ สำคัญ: ต้องใช้ Config เดียวกับโปรเจกต์เป้าหมาย
    const firebaseConfig = {
        apiKey: "AIzaSyD3votmuYJDxy7--PvFj_qe-vk2axspjqo",
        authDomain: "fir-77b01.firebaseapp.com",
        databaseURL: "https://fir-77b01-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "fir-77b01",
        storageBucket: "fir-77b01.firebasestorage.app",
        messagingSenderId: "364738165804",
        appId: "1:364738165804:web:248db4d4a74e146999e589"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ฟังก์ชันเริ่มเกมที่ "โครงสร้างข้อมูล" เหมือนกับ wwdash
    document.getElementById('btn-start-game').onclick = () => {
        if(selectedRoles.length !== players.length) return alert(`เลือกให้ครบ ${players.length} บทบาท`);
        
        let shuffled = [...selectedRoles].sort(() => Math.random() - 0.5);
        let gameData = {};
        
        players.forEach((p, i) => {
            // สร้าง Object ข้อมูลผู้เล่นให้ตรงกับมาตรฐาน wwdash
            gameData[p] = { 
                role: shuffled[i].name, 
                role_en: shuffled[i].en, // เพิ่มชื่ออังกฤษเผื่อระบบนู้นเรียกใช้
                status: 'normal', 
                isLinked: false,
                lastSeen: Date.now() 
            };
        });

        update(ref(db, 'rooms/' + currentRoom), { 
            status: 'playing', 
            gameData: gameData, 
            phase: 0, // เริ่มที่กลางคืนเสมอ
            updatedAt: Date.now()
        });
    };

    // ฟังก์ชันอัปเดตสถานะ (เชื่อมโยงกามเทพ)
    window.updateStatus = (name, st) => {
        const roomRef = ref(db, `rooms/${currentRoom}`);
        
        onValue(roomRef, (snap) => {
            const data = snap.val();
            const updates = {};
            
            // ตรวจสอบระบบคู่รัก (Link) ให้ทำงานสัมพันธ์กัน
            if(data.gameData[name].isLinked) {
                Object.keys(data.gameData).forEach(pKey => {
                    if(data.gameData[pKey].isLinked) {
                        updates[`gameData/${pKey}/status`] = st;
                    }
                });
            } else {
                updates[`gameData/${name}/status`] = st;
            }
            
            // ส่งข้อมูลกลับไปที่ Firebase
            update(roomRef, updates);
        }, { onlyOnce: true });
    };

    // ฟังก์ชันสลับเฟส (Night -> Day -> Vote)
    document.getElementById('btn-next-phase').onclick = () => {
        const phaseRef = ref(db, `rooms/${currentRoom}/phase`);
        onValue(phaseRef, (s) => {
            const currentPhase = s.val() || 0;
            const nextPhase = (currentPhase + 1) % 3;
            update(ref(db, `rooms/${currentRoom}`), { phase: nextPhase });
        }, { onlyOnce: true });
    };
</script>
